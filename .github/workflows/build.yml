name: Build Android APK

on:
  push:
    branches: [ main, master ]   # 同时支持 main 和 master
  workflow_dispatch:             # 保留手动触发

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 诊断：列出根目录文件，确认项目结构
      - name: List files for debug
        run: |
          echo "Repository root contents:"
          ls -la
          echo "Checking for Gradle files..."
          if [ -f "build.gradle" ] || [ -f "build.gradle.kts" ]; then
            echo "✅ Gradle build file found."
          else
            echo "❌ No build.gradle or build.gradle.kts found in root!"
            echo "If your project has a different structure (e.g., app/build.gradle), please adjust the build step."
          fi

      - name: Set up JDK 17
        id: setup-java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set JAVA_HOME globally
        run: echo "JAVA_HOME=${{ steps.setup-java.outputs.path }}" >> $GITHUB_ENV

      - name: Verify Java
        run: |
          echo "JAVA_HOME: $JAVA_HOME"
          java -version

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Remove hardcoded Java home in gradle.properties
        run: |
          if [ -f gradle.properties ]; then
            sed -i '/org.gradle.java.home/d' gradle.properties
            echo "✅ Removed org.gradle.java.home from gradle.properties"
          else
            echo "ℹ️ No gradle.properties file found, skipping."
          fi

      - name: Build APK
        run: gradle assembleDebug --stacktrace --no-daemon

      - name: Find and upload APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "❌ No APK found"
            echo "Searching in build/outputs:"
            find . -path "*/build/outputs/*" -type f || echo "No outputs found"
            exit 1
          fi
          echo "✅ Found APK: $APK_PATH"
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 7